AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Basic Cognito User Pool. Creates a User Pool, app client, and a pre-seeded test user.

Parameters:
  PoolName:
    Type: String
    Default: "CognitoUserPool"
    Description: "Name of the Cognito User Pool"

  AppUsername:
    Type: String
    Default: "testuser"
    Description: "Username for the pre-created app user"

  AppUserPassword:
    Type: String
    NoEcho: true
    Default: ""
    Description: "Permanent password for the app user. Leave blank to auto-generate."

Conditions:
  PasswordProvided: !Not [!Equals [!Ref AppUserPassword, ""]]

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      UserPoolName: !Ref PoolName
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          TemporaryPasswordValidityDays: 7

  AppClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${PoolName}-app-client"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED

  # Domain required for OAuth2 token endpoint (used by M2M client_credentials flow)
  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref UserPool
      Domain: !Select [2, !Split ["/", !Ref "AWS::StackId"]]

  # Resource server defines custom OAuth2 scopes for the M2M client
  ResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref UserPool
      Identifier: !Sub "${PoolName}-api"
      Name: !Sub "${PoolName}-resource-server"
      Scopes:
        - ScopeName: "read"
          ScopeDescription: "Read access"
        - ScopeName: "write"
          ScopeDescription: "Write access"

  # M2M client using client_credentials flow (no user interaction)
  M2MClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: ResourceServer
    Properties:
      ClientName: !Sub "${PoolName}-m2m-client"
      UserPoolId: !Ref UserPool
      GenerateSecret: true
      AllowedOAuthFlows:
        - client_credentials
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - !Sub "${PoolName}-api/read"
        - !Sub "${PoolName}-api/write"
      SupportedIdentityProviders:
        - COGNITO
      PreventUserExistenceErrors: ENABLED

  # Lambda + custom resource to create the test user with a permanent password,
  # mirroring admin_create_user + admin_set_user_password from the Python script.
  CreateUserRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
      Policies:
        - PolicyName: CognitoCreateUser
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminSetUserPassword
                  - cognito-idp:AdminDeleteUser
                Resource: !GetAtt UserPool.Arn
        - PolicyName: SSMPutParameters
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                Resource:
                  - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${PoolName}/app-user/username"
                  - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${PoolName}/app-user/password"
                  - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${PoolName}/m2m/user-pool-id"
                  - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${PoolName}/m2m/client-id"
                  - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${PoolName}/m2m/token-endpoint"

  CreateUserFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${PoolName}-create-test-user"
      Description: "Creates a test user with a permanent password in the Cognito User Pool"
      Runtime: python3.13
      Handler: index.handler
      Role: !GetAtt CreateUserRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import logging
          import secrets
          import string

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          cognito = boto3.client('cognito-idp')
          ssm = boto3.client('ssm')

          def generate_password(length=16):
              """Generate a random password satisfying Cognito policy requirements."""
              lower = string.ascii_lowercase
              upper = string.ascii_uppercase
              digits = string.digits
              symbols = '!@#$%^&*()-_=+'
              # Guarantee at least one of each required character class
              required = [
                  secrets.choice(lower),
                  secrets.choice(upper),
                  secrets.choice(digits),
                  secrets.choice(symbols),
              ]
              pool = lower + upper + digits + symbols
              rest = [secrets.choice(pool) for _ in range(length - len(required))]
              combined = required + rest
              secrets.SystemRandom().shuffle(combined)
              return ''.join(combined)

          def put_ssm(pool_name, username, password, user_pool_id, m2m_client_id, token_endpoint):
              ssm.put_parameter(
                  Name=f'/{pool_name}/app-user/username',
                  Value=username,
                  Type='String',
                  Overwrite=True,
              )
              ssm.put_parameter(
                  Name=f'/{pool_name}/app-user/password',
                  Value=password,
                  Type='SecureString',
                  Overwrite=True,
              )
              ssm.put_parameter(
                  Name=f'/{pool_name}/m2m/user-pool-id',
                  Value=user_pool_id,
                  Type='String',
                  Overwrite=True,
              )
              ssm.put_parameter(
                  Name=f'/{pool_name}/m2m/client-id',
                  Value=m2m_client_id,
                  Type='String',
                  Overwrite=True,
              )
              ssm.put_parameter(
                  Name=f'/{pool_name}/m2m/token-endpoint',
                  Value=token_endpoint,
                  Type='String',
                  Overwrite=True,
              )
              logger.info('SSM parameters written')

          def delete_ssm(pool_name):
              for suffix in ('app-user/username', 'app-user/password', 'm2m/user-pool-id', 'm2m/client-id', 'm2m/token-endpoint'):
                  try:
                      ssm.delete_parameter(Name=f'/{pool_name}/{suffix}')
                  except ssm.exceptions.ParameterNotFound:
                      pass
              logger.info('SSM parameters deleted')

          def handler(event, context):
              props = event['ResourceProperties']
              pool_id = props['UserPoolId']
              pool_name = props['PoolName']
              username = props['Username']
              provided_password = props.get('Password', '')
              m2m_client_id = props['M2MClientId']
              token_endpoint = props['TokenEndpoint']
              physical_id = f'{pool_id}/{username}'

              try:
                  if event['RequestType'] in ('Create', 'Update'):
                      password = provided_password if provided_password else generate_password()

                      try:
                          cognito.admin_create_user(
                              UserPoolId=pool_id,
                              Username=username,
                              TemporaryPassword='Temp1234567!',
                              MessageAction='SUPPRESS'
                          )
                      except cognito.exceptions.UsernameExistsException:
                          logger.info('User already exists, setting password')

                      cognito.admin_set_user_password(
                          UserPoolId=pool_id,
                          Username=username,
                          Password=password,
                          Permanent=True
                      )
                      logger.info(f'User {username} ready')

                      put_ssm(pool_name, username, password, pool_id, m2m_client_id, token_endpoint)

                  elif event['RequestType'] == 'Delete':
                      try:
                          cognito.admin_delete_user(UserPoolId=pool_id, Username=username)
                          logger.info(f'User {username} deleted')
                      except cognito.exceptions.UserNotFoundException:
                          logger.info('User already gone')

                      delete_ssm(pool_name)

                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, physical_id)
              except Exception as e:
                  logger.error(f'Error: {e}', exc_info=True)
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)}, physical_id)

  AppUser:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt CreateUserFunction.Arn
      UserPoolId: !Ref UserPool
      PoolName: !Ref PoolName
      Username: !Ref AppUsername
      Password: !If [PasswordProvided, !Ref AppUserPassword, ""]
      M2MClientId: !Ref M2MClient
      TokenEndpoint: !Sub
        - "https://${Domain}.auth.${AWS::Region}.amazoncognito.com/oauth2/token"
        - Domain: !Select [2, !Split ["/", !Ref "AWS::StackId"]]

Outputs:
  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref UserPool

  AppClientId:
    Description: "User-based app client ID (SRP flow)"
    Value: !Ref AppClient

  M2MClientId:
    Description: "M2M client ID (client_credentials flow)"
    Value: !Ref M2MClient

  TokenEndpoint:
    Description: "OAuth2 token endpoint for M2M authentication"
    Value: !Sub
      - "https://${Domain}.auth.${AWS::Region}.amazoncognito.com/oauth2/token"
      - Domain: !Select [2, !Split ["/", !Ref "AWS::StackId"]]

  DiscoveryUrl:
    Description: "OIDC discovery URL"
    Value: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}/.well-known/openid-configuration"

  AppUsername:
    Description: "Pre-created app username"
    Value: !Ref AppUsername

  AppUsernameSSMPath:
    Description: "SSM path for the app username"
    Value: !Sub "/${PoolName}/app-user/username"

  AppUserPasswordSSMPath:
    Description: "SSM path for the app user password (SecureString)"
    Value: !Sub "/${PoolName}/app-user/password"

  M2MUserPoolIdSSMPath:
    Description: "SSM path for the User Pool ID"
    Value: !Sub "/${PoolName}/m2m/user-pool-id"

  M2MClientIdSSMPath:
    Description: "SSM path for the M2M client ID"
    Value: !Sub "/${PoolName}/m2m/client-id"

  M2MTokenEndpointSSMPath:
    Description: "SSM path for the M2M token endpoint"
    Value: !Sub "/${PoolName}/m2m/token-endpoint"
