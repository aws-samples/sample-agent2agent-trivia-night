      CognitoDomain: !Sub
        - "${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com"
        - DomainPrefix: !Sub
            - "lss-platform-${UniqueId}"
            - UniqueId: !Select [0, !Split ["-", !Select [2, !Split ["/", !Ref "AWS::StackId"]]]]

  # 6.3 - Cognito User Creator Lambda Role
  CognitoUserCreatorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: !Sub lambda.${AWS::URLSuffix}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
      Policies:
        - PolicyName: CognitoAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminSetUserPassword
                  - cognito-idp:DescribeUserPoolClient
                Resource:
                  - !GetAtt CognitoUserPool.Arn
        - PolicyName: SSMAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                Resource:
                  - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/Workshop/platform/*"
        - PolicyName: AgentCoreIdentityAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock-agentcore:CreateOauth2CredentialProvider
                  - bedrock-agentcore:DeleteOauth2CredentialProvider
                  - bedrock-agentcore:CreateTokenVault
                  - bedrock-agentcore:GetTokenVault
                Resource: "*"
              - Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:DeleteSecret
                Resource: "*"

  # 6.3 - Cognito User Creator Lambda
  CognitoUserCreatorLambda:
    Type: AWS::Lambda::Function
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_115
            comment: CloudFormation custom function does not need reserved concurrency
          - id: CKV_AWS_116
            comment: DLQ not required for this CloudFormation custom resource Lambda; failures are surfaced via CloudWatch Logs
          - id: CKV_AWS_117
            comment: CloudFormation custom function does not need VPC
      cfn_nag:
        rules_to_suppress:
          - id: W58
            reason: AWSLambdaBasicExecutionRole includes CloudWatch Logs permissions
          - id: W89
            reason: CloudFormation custom function does not need VPC
          - id: W92
            reason: CloudFormation custom function does not need reserved concurrency
    Properties:
      Description: Creates default workshop participant user in Cognito
      Handler: index.handler
      Runtime: python3.13
      MemorySize: 128
      Timeout: 60
      Architectures:
        - arm64
      Role: !GetAtt CognitoUserCreatorRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import logging
          import string
          import secrets

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def generate_password(length=16):
              """Generate a password meeting Cognito policy: 8+ chars, mixed case, digits, symbols."""
              lower = string.ascii_lowercase
              upper = string.ascii_uppercase
              digits = string.digits
              symbols = '!@#$%^&*()_+-='
              # Ensure at least one of each required type
              password = [
                  secrets.choice(lower),
                  secrets.choice(upper),
                  secrets.choice(digits),
                  secrets.choice(symbols),
              ]
              all_chars = lower + upper + digits + symbols
              password += [secrets.choice(all_chars) for _ in range(length - 4)]
              # Shuffle to avoid predictable positions
              password_list = list(password)
              secrets.SystemRandom().shuffle(password_list)
              return ''.join(password_list)

          def handler(event, context):
              logger.info(f'Event: {event}')
              try:
                  cognito = boto3.client('cognito-idp')
                  ssm = boto3.client('ssm')
                  request_type = event['RequestType']
                  props = event['ResourceProperties']
                  user_pool_id = props['UserPoolId']
                  username = props.get('Username', 'participant')
                  cloudfront_url = props.get('CloudFrontUrl', '')

                  if request_type == 'Delete':
                      try:
                          cognito.admin_delete_user(
                              UserPoolId=user_pool_id,
                              Username=username
                          )
                          logger.info(f'Deleted user {username}')
                      except cognito.exceptions.UserNotFoundException:
                          logger.info(f'User {username} not found, nothing to delete')
                      except Exception as e:
                          logger.warning(f'Error deleting user: {e}')
                      # Delete AgentCore OAuth2 credential provider
                      try:
                          agentcore = boto3.client('bedrock-agentcore-control')
                          agentcore.delete_oauth2_credential_provider(name='cognito-provider')
                          logger.info('Deleted AgentCore OAuth2 credential provider')
                      except Exception as e:
                          logger.warning(f'Error deleting credential provider: {e}')
                      # Clean up SSM parameters
                      for key in ('username', 'password', 'url', 'cognito_discovery_url', 'cognito_client_id', 'user_pool_domain', 'm2m_client_id', 'm2m_client_secret', 'credential_provider_name'):
                          try:
                              ssm.delete_parameter(Name=f'/Workshop/platform/{key}')
                          except ssm.exceptions.ParameterNotFound:
                              pass
                          except Exception as e:
                              logger.warning(f'Error deleting SSM param: {e}')
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return

                  password = generate_password()

                  try:
                      cognito.admin_create_user(
                          UserPoolId=user_pool_id,
                          Username=username,
                          UserAttributes=[
                              {'Name': 'email', 'Value': 'participant@workshop.local'},
                              {'Name': 'given_name', 'Value': 'Workshop'},
                              {'Name': 'family_name', 'Value': 'Participant'},
                              {'Name': 'email_verified', 'Value': 'true'},
                          ],
                          MessageAction='SUPPRESS',
                      )
                      logger.info(f'Created user {username}')
                  except cognito.exceptions.UsernameExistsException:
                      logger.info(f'User {username} already exists')

                  cognito.admin_set_user_password(
                      UserPoolId=user_pool_id,
                      Username=username,
                      Password=password,
                      Permanent=True,
                  )
                  logger.info(f'Set permanent password for {username}')

                  # Store credentials in SSM
                  ssm.put_parameter(
                      Name='/Workshop/platform/username',
                      Value=username,
                      Type='String',
                      Overwrite=True,
                  )
                  ssm.put_parameter(
                      Name='/Workshop/platform/password',
                      Value=password,
                      Type='SecureString',
                      Overwrite=True,
                  )
                  ssm.put_parameter(
                      Name='/Workshop/platform/url',
                      Value=cloudfront_url,
                      Type='String',
                      Overwrite=True,
                  )
                  region = props.get('Region', 'us-east-1')
                  user_pool_client_id = props.get('UserPoolClientId', '')
                  m2m_client_id = props.get('M2MClientId', '')
                  discovery_url = f'https://cognito-idp.{region}.amazonaws.com/{user_pool_id}/.well-known/openid-configuration'
                  ssm.put_parameter(
                      Name='/Workshop/platform/cognito_discovery_url',
                      Value=discovery_url,
                      Type='String',
                      Overwrite=True,
                  )
                  ssm.put_parameter(
                      Name='/Workshop/platform/cognito_client_id',
                      Value=user_pool_client_id,
                      Type='String',
                      Overwrite=True,
                  )
                  user_pool_domain = props.get('UserPoolDomain', '')
                  ssm.put_parameter(
                      Name='/Workshop/platform/user_pool_domain',
                      Value=user_pool_domain,
                      Type='String',
                      Overwrite=True,
                  )
                  ssm.put_parameter(
                      Name='/Workshop/platform/m2m_client_id',
                      Value=m2m_client_id,
                      Type='String',
                      Overwrite=True,
                  )
                  # Fetch and store the M2M client secret
                  if m2m_client_id:
                      m2m_client_desc = cognito.describe_user_pool_client(
                          UserPoolId=user_pool_id,
                          ClientId=m2m_client_id,
                      )
                      m2m_client_secret = m2m_client_desc['UserPoolClient'].get('ClientSecret', '')
                      ssm.put_parameter(
                          Name='/Workshop/platform/m2m_client_secret',
                          Value=m2m_client_secret,
                          Type='SecureString',
                          Overwrite=True,
                      )
                      # Create AgentCore OAuth2 credential provider
                      agentcore = boto3.client('bedrock-agentcore-control')
                      agentcore.create_oauth2_credential_provider(
                          name='cognito-provider',
                          credentialProviderVendor='CustomOauth2',
                          oauth2ProviderConfigInput={
                              'customOauth2ProviderConfig': {
                                  'clientId': m2m_client_id,
                                  'clientSecret': m2m_client_secret,
                                  'oauthDiscovery': {
                                      'discoveryUrl': f'https://cognito-idp.{region}.amazonaws.com/{user_pool_id}/.well-known/openid-configuration',
                                  },
                              }
                          }
                      )
                      logger.info('Created AgentCore OAuth2 credential provider')
                      ssm.put_parameter(
                          Name='/Workshop/platform/credential_provider_name',
                          Value='cognito-provider',
                          Type='String',
                          Overwrite=True,
                      )
                  logger.info('Stored credentials in SSM')

                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      'Username': username,
                      'Password': password,
                      'Url': cloudfront_url,
                  }, noEcho=True)

              except Exception as e:
                  logger.error(f'Error: {e}')
                  cfnresponse.send(event, context, cfnresponse.FAILED, {},
                                   reason=str(e))

  # 6.4 - Cognito User Creator Custom Resource
  CognitoUserCreatorResource:
    Type: Custom::CognitoUserCreator
    Properties:
      ServiceToken: !GetAtt CognitoUserCreatorLambda.Arn
      UserPoolId: !Ref CognitoUserPool
